# Note: If running locally, ensure Docker is installed and available in your PATH.
#       On GitHub Actions, Docker is set up by the workflow.

name: Cypress Parallel Docker Tests

on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t cypress-parallel .

      - name: Run Cypress in Parallel
        run: |
          docker run --rm \
          -e CYPRESS_RECORD_KEY=${{ secrets.CYPRESS_RECORD_KEY }} \
          cypress-parallel
