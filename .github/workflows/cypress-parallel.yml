name: Cypress Parallel Docker Tests

on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t cypress-parallel .

      - name: Run Cypress in Parallel
        run: |
          docker run --rm \
          -e CYPRESS_RECORD_KEY=${{ secrets.CYPRESS_RECORD_KEY }} \
          cypress-parallel
